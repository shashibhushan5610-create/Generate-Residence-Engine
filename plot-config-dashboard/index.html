<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plot Configuration Dashboard Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="js-error-hud"
    style="display:none; position:fixed; top:0; left:0; width:100%; background:#ef4444; color:white; padding:10px; z-index:9999; font-family:monospace; font-size:12px;">
  </div>
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      const hud = document.getElementById('js-error-hud');
      hud.style.display = 'block';
      hud.innerHTML = `ERROR: ${msg} [${lineNo}:${columnNo}] in ${url.split('/').pop()}`;
      return false;
    };
    console.log("Error HUD initialized.");
  </script>

  <header>
    <div class="header-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3h18v18H3zM3 9h18M9 3v18" />
      </svg>
      Plot Configuration Dashboard v2.2
    </div>
    <div style="margin-left: auto; display: flex; gap: 1rem; align-items: center;">
      <button class="btn btn-outline" id="btn-toggle-dims"
        style="font-size: 0.8rem; padding: 0.4rem 0.8rem; width: auto;">
        📏 Dims: ON
      </button>
      <button class="theme-toggle" id="btn-theme-toggle" aria-label="Toggle Theme">
        🌓 Light/Dark
      </button>
    </div>
  </header>

  <div class="app-container">
    <aside class="sidebar">

      <div class="step-container active" data-step="1">
        <div class="step-header">
          <div class="step-title">
            <span class="step-number">1</span> Geometry Definition
          </div>
        </div>
        <div class="step-content">
          <div class="button-group" style="margin-bottom: 1rem;">
            <button class="btn btn-secondary active" id="btn-mode-regular">Regular</button>
            <button class="btn btn-secondary" id="btn-mode-irregular">Irregular</button>
          </div>
          <div id="regular-inputs" style="display: block;">
            <div class="input-row">
              <div class="form-group" style="flex:1">
                <label>Width (m)</label>
                <input type="number" step="0.1" id="input-reg-width" value="10">
              </div>
              <div class="form-group" style="flex:1">
                <label>Height (m)</label>
                <input type="number" step="0.1" id="input-reg-height" value="20">
              </div>
            </div>
          </div>
          <div id="irregular-inputs" style="display: none;">
            <div class="form-group">
              <label>Side Lengths</label>
              <div id="sides-container"></div>
              <button class="btn btn-outline" id="btn-add-side"
                style="margin-top: 0.5rem; font-size: 0.8rem; width: auto;">+ Add Side</button>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
              <label>Diagonals</label>
              <div id="diagonals-container"></div>
              <button class="btn btn-outline" id="btn-add-diag"
                style="margin-top: 0.5rem; font-size: 0.8rem; width: auto;">+ Add Diagonal</button>
            </div>
          </div>
        </div>
      </div>

      <div class="step-container" data-step="2">
        <div class="step-header">
          <div class="step-title">
            <span class="step-number">2</span> Roads & Access
          </div>
        </div>
        <div class="step-content">
          <div id="roads-container"></div>
          <button class="btn btn-outline" id="btn-add-road">+ Add Road</button>
        </div>
      </div>

      <div class="step-container" data-step="3">
        <div class="step-header">
          <div class="step-title">
            <span class="step-number">3</span> Compliance Engine
          </div>
        </div>
        <div class="step-content">
          <div class="form-group">
            <label>Authority</label>
            <select id="select-authority">
              <option value="">-- Select Authority --</option>
            </select>
          </div>
          <div id="compliance-type-selector" style="display: none;">
            <div class="form-group">
              <label>Land Use</label>
              <select id="select-land-use">
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
              </select>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
              <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" id="check-corner-plot">
                Is Corner Plot?
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="step-container" data-step="4">
        <div class="step-header">
          <div class="step-title">
            <span class="step-number">4</span> Validation
          </div>
        </div>
        <div class="step-content">
          <div id="diagnostics-panel"></div>
        </div>
      </div>

      <div class="step-container" data-step="5">
        <div class="step-header">
          <div class="step-title">
            <span class="step-number">5</span> Output
          </div>
        </div>
        <div class="step-content">
          <div class="tabs">
            <div class="tab active" data-target="out-geom">Geometry</div>
            <div class="tab" data-target="out-comp">Compliance</div>
          </div>
          <pre class="code-block" id="out-geom">{}</pre>
          <pre class="code-block" id="out-comp" style="display:none;">{}</pre>
          <div class="button-group">
            <button class="btn btn-primary" id="btn-export-json">JSON</button>
            <button class="btn btn-outline" id="btn-export-dxf">DXF</button>
          </div>
        </div>
      </div>

    </aside>

    <main class="canvas-container" id="canvas-container">
      <canvas id="geometry-canvas"></canvas>
      <div class="canvas-overlay">
        <div class="metric-row"><span>Area</span> <span id="hud-area">0.00</span></div>
        <div class="metric-row"><span>Status</span> <span id="hud-status">Open</span></div>
        <div id="hud-compliance" style="display: none;"></div>
        <div id="hud-perim" style="display:none"></div>
        <div id="hud-error" style="display:none"></div>
      </div>
    </main>
  </div>

  <script>console.log("Plot Dashboard v2.2 - HTML parsing complete.");</script>
  <script src="authorities-data.js"></script>
  <script src="geometry-engine.js"></script>
  <script src="rule-engine.js"></script>
  <script src="smart-dimension-engine.js"></script>
  <script src="dxf-exporter.js"></script>
  <script src="ui-controller.js"></script>
</body>

</html>
